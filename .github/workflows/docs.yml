name: Docs

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch: # allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: |
          set -vxeuo pipefail
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build HTML documentation
        run: |
          set -vxeuo pipefail
          sphinx-build -M html docs/source docs/build --keep-going

      - name: Determine deploy destination
        id: dest
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "dir=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "dir=latest" >> "$GITHUB_OUTPUT"
          else
            echo "dir=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true # preserve other versioned dirs
