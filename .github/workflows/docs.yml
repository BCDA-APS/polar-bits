name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch: # allow manual triggering

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Install documentation dependencies
        run: |
          set -vxeuo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[doc]"
          pip install sphinx-autoapi

      - name: Build HTML documentation
        run: |
          set -vxeuo pipefail
          sphinx-build -M html docs/source docs/build -W --keep-going

      - name: Determine deploy destination
        id: dest
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "dir=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name != 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true # preserve other versioned dirs
