# Guarneri-style device YAML configuration
# Standard labels:
#   core          — loaded by all hutches (shared optics, source)
#   4idb/4idg/4idh — loaded only by that hutch
#   baseline      — included in the supplemental data stream
#   source        — APS source devices

################
## APS Source ##
################

id4_common.devices.aps_xbpm.MyXBPM:
- name: aps_xbpm
  prefix: S04
  labels: ["core", "source", "baseline"]

id4_common.devices.aps_undulator.PolarUndulatorPair:
- name: undulators
  prefix: "S04ID:"
  labels: ["core", "source", "energy device", "baseline"]

id4_common.devices.aps_status.StatusAPS:
- name: status_aps
  prefix: ""
  labels: ["core", "source", "status", "baseline"]

id4_common.devices.polar_status.Status4ID:
- name: status_polar
  prefix: "S04ID-PSS:"
  labels: ["core", "status", "baseline"]

##################################
## 4-ID-A: Common Optics / Core ##
##################################

id4_common.devices.qxscan_device.QxscanParams:
- name: qxscan_setup
  labels: ["core", "qxscan", "energy device", "baseline"]

id4_common.devices.wb_slit.SlitDevice:
- name: wbslt
  prefix: '4idVDCM:'
  motorsDict: {'hor': 'm9', 'diag': 'm10', 'pitch': 'm11', 'yaw': 'm12'}
  slitnum: 1
  labels: ["core", "slit", "baseline"]

id4_common.devices.hhl_mirror.ToroidalMirror:
- name: hhl_mirror
  prefix: "4idHHLM:"
  labels: ["core", "mirror", "baseline"]

id4_common.devices.mono_feedback.MonoFeedback:
- name: mono_feedback
  prefix: "4idbSoft:"
  labels: ["core", "monochromator", "feedback", "baseline"]

id4_common.devices.monochromator.MonoDevice:
- name: mono
  prefix: "4idVDCM:"
  pzt_thf2_pv: "4idaSoft:LJ:Ao5"
  pzt_chi2_pv: "4idaSoft:LJ:Ao3"
  labels: ["core", "monochromator", "energy device", "baseline"]

# PRs prefix must be without :
id4_common.devices.phaseplates.PRDevice:
- name: pr1
  prefix: "4ida"
  prnum: 1
  motorsDict: {x: m1, y: m2, th: m4}
  labels: ["core", "phase retarder", "energy device", "track_energy", "baseline"]

- name: pr2
  prefix: "4ida"
  prnum: 2
  motorsDict: {x: m6, y: m7, th: m9}
  labels: ["core", "phase retarder", "energy device", "track_energy", "baseline"]

id4_common.devices.phaseplates.PRDeviceBase:
- name: pr3
  prefix: "4ida"
  motorsDict: {x: m10, y: m11, th: m12}
  labels: ["core", "phase retarder", "energy device", "track_energy", "baseline"]

id4_common.devices.shutters.PolarShutter:
- name: ashutter
  prefix: ""
  state_pv: "S04ID-PSS:StaA:BeamPresent:CM"
  open_pv: "S04ID-PSS:FES:OpenEPICSC"
  close_pv: "S04ID-PSS:FES:CloseEPICSC"
  labels: ["core", "shutter", "baseline"]

apstools.devices.ApsPssShutterWithStatus:
- name: bshutter
  prefix: ""
  state_pv: "S04ID-PSS:StaB:BeamPresent:CM"
  open_pv: "S04ID-PSS:SBS:OpenEPICSC"
  close_pv: "S04ID-PSS:SBS:CloseEPICSC"
  labels: ["core", "shutter", "baseline"]

id4_common.devices.energy_device.EnergySignal:
- name: energy
  value: 10
  kind: hinted
  labels: ["core", "energy device", "baseline"]

id4_common.devices.mirror_toroidal.ToroidalMirror:
- name: t_mirror
  prefix: "4idbToro:"
  labels: ["core", "optics", "mirror", "baseline"]

id4_common.devices.diamond_window_table.WindowStages:
- name: diamond_window
  prefix: "4idbSoft:"
  labels: ["core", "baseline"]

# Both labjacks share the same class — must be under one key
id4_common.devices.labjacks.CustomLabJackT7:
- name: labjack_4ida
  prefix: "4idaSoft:LJ:"
  labels: ["core", "baseline"]

- name: labjack_4idb
  prefix: "4idbSoft:LJ:"
  labels: ["4idb", "baseline"]

# All JJ slits share the same class — must be under one key
id4_common.devices.jj_slits.SlitDevice:
- name: monoslt
  PV: "4idVDCM:"
  motorsDict: {top: m14, bot: m13, out: m16, inb: m15}
  slitnum: 2
  labels: ["core", "slit", "baseline"]

# 4-ID-B
- name: bslt
  PV: "4idbSoft:"
  motorsDict: {top: m11, bot: m10, out: m13, inb: m12}
  slitnum: 1
  labels: ["4idb", "slit", "baseline"]

# 4-ID-G
- name: gslt
  PV: "4idgSoft:"
  motorsDict: {top: m44, bot: m43, out: m46, inb: m45}
  slitnum: 1
  labels: ["4idg", "slit", "baseline"]

# 4-ID-H
- name: hslt
  PV: "4idhSoft:"
  motorsDict: {top: m11, bot: m10, out: m12, inb: m13}
  slitnum: 1
  labels: ["4idh", "slit", "baseline"]

########
## DM ##
########

apstools.devices.DM_WorkflowConnector:
- name: dm_workflow
  labels: ["core", "dm", "baseline"]

ophyd.Signal:
- name: dm_experiment
  value: ""
  labels: ["core", "dm", "baseline"]

